<!DOCTYPE html>
<html>

<head>
    <title>TrashForm AI</title>

    <style>

        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: auto;
            padding: 30px;
            background: #f2f8f2;
        }

        h1 {
            color: #2E8B57;
        }

        input {
            width: 80px;
            padding: 8px;
            margin: 5px;
        }

        button {
            padding: 12px 20px;
            background: #2E8B57;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 8px;
        }

        button:hover {
            background: #246b45;
        }

        #result {
            background: white;
            margin-top: 25px;
            padding: 20px;
            border-radius: 12px;
        }

    </style>

</head>


<body>

<h1>♻️ TrashForm AI</h1>

<p>
Turn your waste into useful products.
</p>


<h3>Enter Your Waste Materials</h3>


<label>
Plastic Bottles:
</label>

<input 
type="number" 
id="plastic" 
min="0" 
value="0">


<br>


<label>
Milk Cartons:
</label>

<input 
type="number" 
id="carton" 
min="0" 
value="0">


<br>


<label>
Cardboard Pieces:
</label>

<input 
type="number" 
id="cardboard" 
min="0" 
value="0">


<br>


<label>
Aluminum Cans:
</label>

<input 
type="number" 
id="cans" 
min="0" 
value="0">


<br><br>


<button onclick="findIdeas()">
🤖 Generate AI Idea
</button>



<div id="result">

</div>



<script>


function findIdeas(){


let plastic =
Number(document.getElementById("plastic").value);


let cartons =
Number(document.getElementById("carton").value);


let cardboard =
Number(document.getElementById("cardboard").value);


let cans =
Number(document.getElementById("cans").value);



let result =
document.getElementById("result");



let projects = [];



// PROJECT 1: Eco Garden

if(plastic >= 5 && cartons >= 2){

projects.push({

name:"Eco Garden Station",

score:95,

materials:
"5 Plastic Bottles + 2 Milk Cartons",

difficulty:
"Medium ⭐⭐",

steps:[

"Clean all bottles and cartons.",

"Cut openings into the plastic bottles.",

"Use cartons to create plant labels.",

"Add soil and plants.",

"Arrange the bottles into a vertical garden."

],

impact:
"Reuses multiple waste materials and creates a sustainable garden."

});

}



// PROJECT 2: Vertical Garden

if(plastic >= 5){

projects.push({

name:"Vertical Bottle Garden",

score:85,

materials:
"5 Plastic Bottles",

difficulty:
"Medium ⭐⭐",

steps:[

"Wash plastic bottles.",

"Cut a planting area.",

"Make drainage holes.",

"Add soil.",

"Plant seeds."

],

impact:
"Prevents plastic bottles from becoming waste."

});

}



// PROJECT 3: Plant Pot

if(plastic >= 1){

projects.push({

name:"Bottle Plant Pot",

score:60,

materials:
"1 Plastic Bottle",

difficulty:
"Easy ⭐",

steps:[

"Clean the bottle.",

"Cut the bottle in half.",

"Create drainage holes.",

"Add soil.",

"Plant a small plant."

],

impact:
"Gives plastic bottles a second life."

});

}



// PROJECT 4: Storage Box

if(cartons >= 2){

projects.push({

name:"Milk Carton Storage Box",

score:75,

materials:
"2 Milk Cartons",

difficulty:
"Easy ⭐",

steps:[

"Clean the cartons.",

"Cut the top sections.",

"Join cartons together.",

"Decorate the outside.",

"Use as storage."

],

impact:
"Turns packaging waste into reusable storage."

});

}



// PROJECT 5: Cardboard Organizer

if(cardboard >= 1){

projects.push({

name:"Cardboard Desk Organizer",

score:70,

materials:
"Cardboard",

difficulty:
"Easy ⭐",

steps:[

"Measure cardboard pieces.",

"Cut sections.",

"Glue pieces together.",

"Create compartments.",

"Decorate."

],

impact:
"Reduces cardboard waste."

});

}



// PROJECT 6: Can Holder

if(cans >= 3){

projects.push({

name:"Aluminum Can Pen Holder",

score:65,

materials:
"3 Aluminum Cans",

difficulty:
"Easy ⭐",

steps:[

"Wash cans.",

"Remove dangerous edges.",

"Paint the cans.",

"Use them as holders."

],

impact:
"Recycles aluminum materials."

});

}




// AI SELECTS BEST MATCH

if(projects.length > 0){



projects.sort(function(a,b){

return b.score - a.score;

});



let best =
projects[0];



result.innerHTML = `


<h2>
🤖 TrashForm AI Recommendation
</h2>


<h3>
${best.name}
</h3>


<p>
<b>AI Match Score:</b>
${best.score}%
</p>


<p>
<b>Materials:</b>
${best.materials}
</p>


<p>
<b>Difficulty:</b>
${best.difficulty}
</p>



<h3>
How To Make It:
</h3>


<ol>

${best.steps.map(function(step){

return "<li>" + step + "</li>";

}).join("")}

</ol>



<p>

<b>
Environmental Impact:
</b>

${best.impact}

</p>


`;



}

else{


result.innerHTML = `

<h2>
🤖 TrashForm AI
</h2>

<p>
Add more waste materials so I can generate a project idea!
</p>

`;

}



}



</script>


</body>

</html>
