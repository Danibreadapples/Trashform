<!DOCTYPE html>
<html>

<head>
<title>TrashForm AI</title>

<style>

body {
    font-family: Arial, sans-serif;
    max-width: 900px;
    margin: auto;
    padding: 30px;
    background: #eef7ee;
}

h1 {
    color: #2e8b57;
}

input {
    width: 100px;
    padding: 8px;
    margin: 5px;
}

button {
    padding: 12px 20px;
    background: #2e8b57;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

button:hover {
    background: #246b45;
}

#result {
    background:white;
    margin-top:25px;
    padding:20px;
    border-radius:15px;
}

.project {
    border:1px solid #ddd;
    padding:15px;
    margin-top:15px;
    border-radius:10px;
}

</style>

</head>


<body>

<h1>♻️ TrashForm AI</h1>

<p>
Transform your waste into useful products.
</p>


<h3>Enter Your Materials</h3>


Plastic Bottles:
<input id="plastic" type="number" min="0" value="0">

<br>

Milk Cartons:
<input id="carton" type="number" min="0" value="0">

<br>

Cardboard:
<input id="cardboard" type="number" min="0" value="0">

<br>

Aluminum Cans:
<input id="cans" type="number" min="0" value="0">

<br><br>


<button onclick="findIdeas()">
🤖 Generate AI Recommendations
</button>



<div id="result"></div>



<script>


function findIdeas(){


let plastic =
Number(document.getElementById("plastic").value);

let carton =
Number(document.getElementById("carton").value);

let cardboard =
Number(document.getElementById("cardboard").value);

let cans =
Number(document.getElementById("cans").value);


let result =
document.getElementById("result");


let projects = [];



// Combined materials

if(plastic >= 5 && carton >= 2){

projects.push({

name:"Eco Garden Station",

score:95,

materials:"5 Plastic Bottles + 2 Milk Cartons",

difficulty:"Medium ⭐⭐",

reason:"You have enough mixed materials for a larger project.",

steps:[
"Clean all materials.",
"Cut openings into bottles.",
"Use cartons for plant labels.",
"Add soil.",
"Plant seeds."
],

impact:"Reuses different waste types together."

});

}



// Plastic projects

if(plastic >= 5){

projects.push({

name:"Vertical Bottle Garden",

score:85,

materials:"5 Plastic Bottles",

difficulty:"Medium ⭐⭐",

reason:"You have enough bottles for a multi-bottle project.",

steps:[
"Wash bottles.",
"Create planting openings.",
"Make drainage holes.",
"Add soil.",
"Grow plants."
],

impact:"Prevents plastic waste from entering landfills."

});

}


if(plastic >= 1){

projects.push({

name:"Bottle Plant Pot",

score:60,

materials:"1 Plastic Bottle",

difficulty:"Easy ⭐",

reason:"A simple project suitable for small quantities.",

steps:[
"Clean the bottle.",
"Cut it safely.",
"Add drainage holes.",
"Fill with soil.",
"Plant seeds."
],

impact:"Gives plastic bottles a second use."

});

}



// Carton projects

if(carton >= 2){

projects.push({

name:"Milk Carton Organizer",

score:75,

materials:"2 Milk Cartons",

difficulty:"Easy ⭐",

reason:"You have enough cartons to create storage.",

steps:[
"Clean cartons.",
"Cut the tops.",
"Join cartons together.",
"Decorate."
],

impact:"Turns packaging waste into useful storage."

});

}



// Cardboard

if(cardboard >= 1){

projects.push({

name:"Cardboard Organizer",

score:70,

materials:"Cardboard",

difficulty:"Easy ⭐",

reason:"Cardboard can easily be reshaped.",

steps:[
"Measure cardboard.",
"Cut pieces.",
"Glue sections.",
"Create compartments."
],

impact:"Extends the life of cardboard."

});

}



// Cans

if(cans >= 3){

projects.push({

name:"Can Pen Holder",

score:65,

materials:"3 Aluminum Cans",

difficulty:"Easy ⭐",

reason:"Enough cans available for a reusable holder.",

steps:[
"Clean cans.",
"Remove unsafe edges.",
"Decorate.",
"Use as storage."
],

impact:"Recycles aluminum waste."

});

}



// Sort by AI score

projects.sort(function(a,b){

return b.score-a.score;

});




// Display multiple results

if(projects.length > 0){


let output = `

<h2>
🤖 TrashForm AI Results
</h2>

`;



projects.forEach(function(project,index){


let medal =
index==0 ? "🥇" :
index==1 ? "🥈" :
index==2 ? "🥉" :
"♻️";



output += `

<div class="project">

<h2>
${medal} ${project.name}
</h2>

<p>
<b>AI Match:</b> ${project.score}%
</p>


<p>
<b>Materials:</b> ${project.materials}
</p>


<p>
<b>Difficulty:</b> ${project.difficulty}
</p>


<p>
<b>Why recommended:</b> ${project.reason}
</p>


<h3>
Steps:
</h3>

<ol>

${project.steps.map(function(step){

return "<li>"+step+"</li>";

}).join("")}

</ol>


<p>
<b>Environmental Impact:</b>
${project.impact}
</p>


</div>

`;

});


result.innerHTML = output;


}

else{


result.innerHTML = `

<h2>🤖 TrashForm AI</h2>

<p>
I need more materials to generate ideas.
</p>

`;

}


}


</script>


</body>

</html>
