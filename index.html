<!DOCTYPE html>
<html>

<head>

<title>TrashForm</title>

<style>

body {
    font-family: Arial, sans-serif;
    max-width: 900px;
    margin: auto;
    padding: 30px;
    background: #eef7ee;
}


h1 {
    color: #2e8b57;
}


h3 {
    color: #2e8b57;
}


input {
    width: 120px;
    padding: 8px;
    margin: 5px;
    border-radius: 5px;
    border: 1px solid #aaa;
}


button {

    padding: 12px 20px;

    background: #2e8b57;

    color: white;

    border: none;

    border-radius: 8px;

    cursor: pointer;

}


button:hover {

    background:#246b45;

}



#result {

    background:white;

    margin-top:25px;

    padding:20px;

    border-radius:15px;

}



.project {

    border:1px solid #ddd;

    padding:15px;

    margin-top:15px;

    border-radius:10px;

}



li {

    margin:5px;

}


</style>


</head>



<body>


<h1>
♻️ TrashForm
</h1>


<p>
Turn your waste into useful products.
</p>



<h3>
Enter Your Waste Materials
</h3>



<label>
Plastic Bottles:
</label>

<input 
id="plastic"
type="number"
min="0"
value="0">

<br>



<label>
Milk Cartons:
</label>

<input 
id="carton"
type="number"
min="0"
value="0">

<br>



<label>
Cardboard:
</label>

<input 
id="cardboard"
type="number"
min="0"
value="0">

<br>



<label>
Aluminum Cans:
</label>

<input 
id="cans"
type="number"
min="0"
value="0">

<br>



<label>
Glass Bottles:
</label>

<input 
id="glass"
type="number"
min="0"
value="0">

<br>



<label>
Old Clothes:
</label>

<input 
id="clothes"
type="number"
min="0"
value="0">

<br>



<label>
Egg Cartons:
</label>

<input 
id="eggs"
type="number"
min="0"
value="0">



<br><br>



<button onclick="findIdeas()">

Find Upcycling Ideas

</button>



<div id="result">

</div>
<script>

function findIdeas(){


let plastic =
Number(document.getElementById("plastic").value);

let carton =
Number(document.getElementById("carton").value);

let cardboard =
Number(document.getElementById("cardboard").value);

let cans =
Number(document.getElementById("cans").value);

let glass =
Number(document.getElementById("glass").value);

let clothes =
Number(document.getElementById("clothes").value);

let eggs =
Number(document.getElementById("eggs").value);



let result =
document.getElementById("result");



let projects = [];



// =====================
// ECO GARDEN STATION
// =====================

if(plastic >= 5 && carton >= 2){

projects.push({

name:"Eco Garden Station",

score:95,

materials:
"5 Plastic Bottles + 2 Milk Cartons",

difficulty:
"Medium ⭐⭐",

reason:
"You have enough mixed materials for a larger sustainability project.",


tools:[

"Scissors",

"String",

"Soil",

"Small plants",

"Decorations"

],


steps:[

"Clean all bottles and cartons.",

"Cut openings into plastic bottles.",

"Use cartons as plant labels.",

"Add soil into bottles.",

"Plant seeds or small plants."

],


impact:
"Reuses different waste materials together and creates a reusable garden."

});

}



// =====================
// VERTICAL GARDEN
// =====================

if(plastic >= 5){

projects.push({

name:"Vertical Bottle Garden",

score:85,

materials:
"5 Plastic Bottles",


difficulty:
"Medium ⭐⭐",


reason:
"You have enough bottles to create a multi-container garden.",


tools:[

"Scissors",

"String",

"Soil",

"Seeds"

],


steps:[

"Wash all bottles.",

"Cut planting openings.",

"Create drainage holes.",

"Attach bottles together.",

"Add soil and plants."

],


impact:
"Prevents plastic bottles from becoming waste."

});

}



// =====================
// BOTTLE PLANT POT
// =====================

if(plastic >= 1){

projects.push({

name:"Bottle Plant Pot",

score:60,


materials:
"1 Plastic Bottle",


difficulty:
"Easy ⭐",


reason:
"A simple project suitable for small amounts of plastic.",


tools:[

"Scissors",

"Soil",

"Seeds",

"Paint or decorations"

],


steps:[

"Clean the bottle.",

"Cut the bottle safely.",

"Make drainage holes.",

"Add soil.",

"Plant seeds."

],


impact:
"Gives plastic bottles a second purpose."

});

}



// =====================
// MILK CARTON ORGANIZER
// =====================

if(carton >= 2){

projects.push({

name:"Milk Carton Organizer",

score:75,


materials:
"2 Milk Cartons",


difficulty:
"Easy ⭐",


reason:
"Your cartons can become useful storage.",


tools:[

"Scissors",

"Glue",

"Colored paper",

"Markers"

],


steps:[

"Clean cartons.",

"Cut the top sections.",

"Glue cartons together.",

"Decorate the outside."

],


impact:
"Transforms packaging waste into reusable storage."

});

}



// =====================
// CARDBOARD ORGANIZER
// =====================

if(cardboard >= 1){

projects.push({

name:"Cardboard Desk Organizer",

score:70,


materials:
"Cardboard",


difficulty:
"Easy ⭐",


reason:
"Cardboard can easily be reshaped into useful products.",


tools:[

"Scissors",

"Glue",

"Ruler",

"Decorations"

],


steps:[

"Measure cardboard pieces.",

"Cut required shapes.",

"Glue sections together.",

"Create compartments."

],


impact:
"Extends the lifespan of cardboard waste."

});

}



// =====================
// ALUMINUM CAN HOLDER
// =====================

if(cans >= 3){

projects.push({

name:"Aluminum Can Pen Holder",

score:65,


materials:
"3 Aluminum Cans",


difficulty:
"Easy ⭐",


reason:
"You have enough cans for a reusable container.",


tools:[

"Paint",

"Brush",

"Decorations",

"Safety gloves"

],


steps:[

"Clean cans.",

"Remove unsafe edges.",

"Paint the cans.",

"Use them as holders."

],


impact:
"Recycles aluminum materials."

});

}
    
// =====================
// GLASS BOTTLE VASE
// =====================

if(glass >= 1){

projects.push({

name:"Glass Bottle Vase",

score:70,


materials:
"1 Glass Bottle",


difficulty:
"Easy ⭐",


reason:
"Glass bottles can become reusable decorations.",


tools:[

"Paint",

"Brush",

"Flowers",

"Decorations"

],


steps:[

"Clean the glass bottle.",

"Remove labels.",

"Decorate the bottle.",

"Add flowers or plants."

],


impact:
"Reuses glass containers instead of throwing them away."

});

}



// =====================
// CLOTH BAG
// =====================

if(clothes >= 1){

projects.push({

name:"Reusable Cloth Bag",

score:80,


materials:
"Old Clothes",


difficulty:
"Medium ⭐⭐",


reason:
"Old fabric can be transformed into useful items.",


tools:[

"Needle",

"Thread",

"Scissors",

"Fabric"

],


steps:[

"Choose unused clothing.",

"Cut fabric pieces.",

"Sew pieces together.",

"Create handles."

],


impact:
"Reduces textile waste."

});

}



// =====================
// EGG CARTON SEED TRAY
// =====================

if(eggs >= 1){

projects.push({

name:"Egg Carton Seed Tray",

score:75,


materials:
"Egg Carton",


difficulty:
"Easy ⭐",


reason:
"Egg cartons are useful for growing plants.",


tools:[

"Soil",

"Seeds",

"Water",

"Small gardening tools"

],


steps:[

"Clean the egg carton.",

"Add soil.",

"Plant seeds.",

"Move seedlings when ready."

],


impact:
"Turns packaging waste into a gardening tool."

});

}



// =====================
// SORT PROJECTS
// =====================

projects.sort(function(a,b){

return b.score - a.score;

});



// =====================
// DISPLAY RESULTS
// =====================


if(projects.length > 0){


let output = `

<h2>
Recommended Projects
</h2>

`;



projects.forEach(function(project,index){



let rank;


if(index === 0){

rank="🥇";

}

else if(index === 1){

rank="🥈";

}

else if(index === 2){

rank="🥉";

}

else{

rank="♻️";

}




output += `


<div class="project">


<h2>

${rank} ${project.name}

</h2>



<p>

<b>Match Score:</b>

${project.score}%

</p>



<p>

<b>Waste Used:</b>

${project.materials}

</p>



<p>

<b>Difficulty:</b>

${project.difficulty}

</p>



<h3>

Tools & Extra Materials:

</h3>



<ul>

${project.tools.map(function(tool){

return "<li>"+tool+"</li>";

}).join("")}

</ul>




<p>

<b>Why this fits:</b>

${project.reason}

</p>



<h3>

How To Make It:

</h3>



<ol>

${project.steps.map(function(step){

return "<li>"+step+"</li>";

}).join("")}

</ol>




<p>

<b>Environmental Impact:</b>

${project.impact}

</p>



</div>


`;

});


result.innerHTML = output;


}



else{


result.innerHTML = `

<h2>
TrashForm
</h2>

<p>
Add some waste materials to find suitable projects.
</p>

`;

}



}



</script>


</body>

</html>
