<!DOCTYPE html>
<html>

<head>

<title>TrashForm</title>

<style>

body {
    font-family: Arial, sans-serif;
    max-width: 900px;
    margin: auto;
    padding: 30px;
    background: #eef7ee;
}

h1 {
    color: #2e8b57;
}

input {
    width: 100px;
    padding: 8px;
    margin: 5px;
}

button {
    padding: 12px 20px;
    background: #2e8b57;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

button:hover {
    background: #246b45;
}

#result {
    background:white;
    margin-top:25px;
    padding:20px;
    border-radius:15px;
}

.project {
    border:1px solid #ddd;
    padding:15px;
    margin-top:15px;
    border-radius:10px;
}

</style>

</head>


<body>


<h1>♻️ TrashForm</h1>

<p>
Turn your waste into useful products.
</p>


<h3>Enter Your Waste Materials</h3>


Plastic Bottles:
<input id="plastic" type="number" min="0" value="0">

<br>


Milk Cartons:
<input id="carton" type="number" min="0" value="0">

<br>


Cardboard:
<input id="cardboard" type="number" min="0" value="0">

<br>


Aluminum Cans:
<input id="cans" type="number" min="0" value="0">

<br>


Glass Bottles:
<input id="glass" type="number" min="0" value="0">

<br>


Old Clothes:
<input id="clothes" type="number" min="0" value="0">

<br>


Egg Cartons:
<input id="eggs" type="number" min="0" value="0">

<br>


Food Scraps:
<input id="food" type="number" min="0" value="0">


<br><br>


<button onclick="findIdeas()">
Find Upcycling Ideas
</button>


<div id="result"></div>
<script>

function findIdeas(){


let plastic =
Number(document.getElementById("plastic").value);

let carton =
Number(document.getElementById("carton").value);

let cardboard =
Number(document.getElementById("cardboard").value);

let cans =
Number(document.getElementById("cans").value);

let glass =
Number(document.getElementById("glass").value);

let clothes =
Number(document.getElementById("clothes").value);

let eggs =
Number(document.getElementById("eggs").value);

let food =
Number(document.getElementById("food").value);



let result =
document.getElementById("result");


let projects = [];



// Plastic + Carton

if(plastic >= 5 && carton >= 2){

projects.push({

name:"Eco Garden Station",

score:95,

materials:"5 Plastic Bottles + 2 Milk Cartons",

difficulty:"Medium ⭐⭐",

reason:"You have enough mixed materials for a larger project.",

steps:[

"Clean bottles and cartons.",

"Cut openings into bottles.",

"Use cartons as plant labels.",

"Add soil.",

"Plant seeds."

],

impact:"Reuses multiple waste materials together."

});

}



// Plastic Bottle Garden

if(plastic >= 5){

projects.push({

name:"Vertical Bottle Garden",

score:85,

materials:"5 Plastic Bottles",

difficulty:"Medium ⭐⭐",

reason:"You have enough bottles for a garden project.",

steps:[

"Wash bottles.",

"Cut planting openings.",

"Create drainage holes.",

"Add soil.",

"Plant seeds."

],

impact:"Reduces plastic waste."

});

}



// Bottle Plant Pot

if(plastic >= 1){

projects.push({

name:"Bottle Plant Pot",

score:60,

materials:"1 Plastic Bottle",

difficulty:"Easy ⭐",

reason:"A simple project for small amounts of plastic.",

steps:[

"Clean bottle.",

"Cut bottle safely.",

"Create drainage holes.",

"Add soil.",

"Plant a small plant."

],

impact:"Gives plastic bottles a second use."

});

}



// Milk Carton

if(carton >= 2){

projects.push({

name:"Milk Carton Organizer",

score:75,

materials:"2 Milk Cartons",

difficulty:"Easy ⭐",

reason:"Your cartons can become reusable storage.",

steps:[

"Clean cartons.",

"Cut the top sections.",

"Join cartons together.",

"Decorate."

],

impact:"Reduces packaging waste."

});

}



// Cardboard

if(cardboard >= 1){

projects.push({

name:"Cardboard Desk Organizer",

score:70,

materials:"Cardboard",

difficulty:"Easy ⭐",

reason:"Cardboard can easily be reshaped.",

steps:[

"Measure cardboard.",

"Cut pieces.",

"Glue pieces together.",

"Create compartments."

],

impact:"Extends cardboard usage."

});

}



// Aluminum Cans

if(cans >= 3){

projects.push({

name:"Aluminum Can Pen Holder",

score:65,

materials:"3 Aluminum Cans",

difficulty:"Easy ⭐",

reason:"You have enough cans for a container.",

steps:[

"Clean cans.",

"Remove sharp edges.",

"Decorate cans.",

"Use as holders."

],

impact:"Recycles aluminum."

});

}



// Glass

if(glass >= 1){

projects.push({

name:"Glass Bottle Vase",

score:70,

materials:"1 Glass Bottle",

difficulty:"Easy ⭐",

reason:"Glass bottles work well as decorations.",

steps:[

"Clean bottle.",

"Remove labels.",

"Decorate bottle.",

"Add flowers."

],

impact:"Reuses glass containers."

});

}



// Clothes

if(clothes >= 1){

projects.push({

name:"Reusable Cloth Bag",

score:80,

materials:"Old Clothes",

difficulty:"Medium ⭐⭐",

reason:"Old fabric can become useful items.",

steps:[

"Choose unused clothing.",

"Cut fabric pieces.",

"Sew pieces together.",

"Create handles."

],

impact:"Reduces textile waste."

});

}



// Egg Carton

if(eggs >= 1){

projects.push({

name:"Seed Starter Tray",

score:75,

materials:"Egg Carton",

difficulty:"Easy ⭐",

reason:"Egg cartons are useful for gardening.",

steps:[

"Clean carton.",

"Add soil.",

"Plant seeds.",

"Move plants when ready."

],

impact:"Turns packaging into gardening tools."

});

}



// Food Waste

if(food >= 1){

projects.push({

name:"Compost",

score:85,

materials:"Food Scraps",

difficulty:"Easy ⭐",

reason:"Food scraps can become fertilizer.",

steps:[

"Collect food scraps.",

"Mix with dry leaves.",

"Wait for composting.",

"Use fertilizer for plants."

],

impact:"Reduces organic waste."

});

}



// Sort recommendations

projects.sort(function(a,b){

return b.score-a.score;

});



// Display

if(projects.length > 0){


let output = `

<h2>
Recommended Projects
</h2>

`;



projects.forEach(function(project,index){


let rank = "";

if(index === 0){
rank="🥇";
}

else if(index === 1){
rank="🥈";
}

else if(index === 2){
rank="🥉";
}

else{
rank="♻️";
}



output += `

<div class="project">


<h2>
${rank} ${project.name}
</h2>


<p>
<b>Match Score:</b> ${project.score}%
</p>


<p>
<b>Materials Needed:</b>
${project.materials}
</p>


<p>
<b>Difficulty:</b>
${project.difficulty}
</p>


<p>
<b>Why this fits:</b>
${project.reason}
</p>


<h3>
How To Make It:
</h3>


<ol>

${project.steps.map(function(step){

return "<li>"+step+"</li>";

}).join("")}

</ol>


<p>
<b>Environmental Impact:</b>
${project.impact}
</p>


</div>

`;

});


result.innerHTML = output;


}

else{


result.innerHTML = `

<h2>
TrashForm
</h2>

<p>
Please enter some waste materials first.
</p>

`;

}


}


</script>


</body>

</html>
