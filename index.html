<!DOCTYPE html>
<html>
<head>
    <title>TrashForm</title>
</head>
<body>
    <h1>TrashForm</h1>
    <p>Turn waste into useful products.</p>

<select id="material">
    <option value="plastic bottle">Plastic Bottle</option>
    <option value="milk carton">Milk Carton</option>
    <option value="cardboard">Cardboard</option>
</select>

<input type="number" id="quantity" min="1" value="1">

<button onclick="findIdeas()">Find Projects</button>

<p id="result"></p>

    <script>
        function findIdeas() {
            let material = document.getElementById("material").value.toLowerCase();
            let result = document.getElementById("result");

            if(material === "plastic bottle") {
                result.innerHTML = "Plant Pot, Bird Feeder, Phone Stand";
            } else if(material === "milk carton") {
                result.innerHTML = "Wallet, Pencil Holder, Storage Box";
            } else {
                result.innerHTML = "No ideas found.";
            }
        }
    </script>
</body>
</html>
